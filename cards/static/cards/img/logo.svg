<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
    <defs>
        <linearGradient id="mcMarkGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#7CFFB2"/>
            <stop offset="100%" stop-color="#38E1FF"/>
        </linearGradient>
        <linearGradient id="mcTextGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#F2F4F8"/>
            <stop offset="70%" stop-color="#F2F4F8"/>
            <stop offset="100%" stop-color="#7CFFB2"/>
        </linearGradient>
        <filter id="mcGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="1.6" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Logo mark: rounded square with card-in-card motif -->
    <g filter="url(#mcGlow)">
        <rect x="4" y="8" width="44" height="44" rx="10" fill="url(#mcMarkGrad)"/>
        <rect x="12" y="16" width="28" height="20" rx="4" fill="none" stroke="#05060B" stroke-width="1.6" opacity="0.9"/>
        <rect x="16" y="19" width="8" height="8" rx="4" fill="#05060B" opacity="0.9"/>
        <line x1="16" y1="30" x2="36" y2="30" stroke="#05060B" stroke-width="1.5" opacity="0.9"/>
        <line x1="16" y1="33.5" x2="30" y2="33.5" stroke="#05060B" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- Wordmark -->
    <text x="60" y="38" font-family="'Bai Jamjuree', 'Space Grotesk', 'Inter', sans-serif"
          font-size="26" font-weight="700" fill="url(#mcTextGrad)" letter-spacing="-0.5">
        MY<tspan fill="#7CFFB2">·</tspan>Card
    </text>
</svg>
